<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE NIGHT BITE | Student Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .modal-active { display: flex !important; }
         
        .glass-nav { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(255,255,255,0.08); }
        .glass-card { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.05); }
         
        .gradient-text { background: linear-gradient(90deg, #38bdf8, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-glow:hover { box-shadow: 0 0 20px rgba(249, 115, 22, 0.4); transform: translateY(-2px); }
     
        .tooltip-container { position: relative; }
        .tooltip-popup {
            position: absolute; bottom: 120%; left: 50%; transform: translateX(-50%) scale(0.8);
            background: #1e293b; color: white; padding: 6px 12px; border-radius: 8px;
            font-size: 11px; font-weight: 700; white-space: nowrap; opacity: 0;
            pointer-events: none; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5);
        }
        .tooltip-container:hover .tooltip-popup { opacity: 1; transform: translateX(-50%) scale(1); }
   
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-5px); } 100% { transform: translateY(0px); } }
        .animate-float { animation: float 3s ease-in-out infinite; }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 min-h-screen selection:bg-orange-500/30">

    <nav class="glass-nav p-4 flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-2xl font-black italic tracking-tighter uppercase">
            THE <span class="gradient-text">NIGHT BITE</span>
        </h1>
        <div class="flex items-center gap-5">
            <div class="tooltip-container hidden md:block">
                <button onclick="openModal('admin')" class="text-[10px] tracking-widest uppercase font-bold text-slate-500 hover:text-orange-400 transition-colors">Staff Access</button>
                <span class="tooltip-popup">Admin Dashboard</span>
            </div>

            <div class="tooltip-container">
                <button id="userStatus" onclick="openModal('user')" class="bg-slate-800/80 text-white px-5 py-2 rounded-xl font-semibold border border-slate-700 hover:border-orange-500/50 transition-all duration-300">Sign In</button>
                <span class="tooltip-popup">Unlock Perks 🔓</span>
            </div>

            <div class="tooltip-container">
                <button onclick="toggleCart()" class="relative bg-orange-600 p-2.5 rounded-xl btn-glow transition-all">
                    <i class="fas fa-shopping-basket text-xl text-white"></i>
                    <span id="cartCount" class="absolute -top-2 -right-2 bg-white text-orange-600 text-[10px] font-black rounded-full h-5 w-5 flex items-center justify-center shadow-lg border-2 border-orange-600">0</span>
                </button>
                <span class="tooltip-popup">View Tray</span>
            </div>
        </div>
    </nav>

    <div id="adminDash" class="fixed inset-0 bg-[#020617] z-[300] hidden overflow-y-auto p-8">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-12 border-b border-slate-800 pb-8">
            <h2 class="text-3xl font-black tracking-tighter">ADMIN <span class="text-orange-500">CONSOLE</span></h2>
            <div class="flex gap-4">
                <button onclick="toggleAdminView('orders')" class="bg-slate-800 text-white px-6 py-3 rounded-xl font-bold hover:bg-orange-600 transition-all">Orders</button>
                <button onclick="toggleAdminView('menu')" class="bg-slate-800 text-white px-6 py-3 rounded-xl font-bold hover:bg-orange-600 transition-all">Menu Manager</button>
                <button onclick="location.reload()" class="bg-red-500/10 text-red-500 px-8 py-3 rounded-2xl font-bold border border-red-500/20 hover:bg-red-500 hover:text-white transition-all">Logout</button>
            </div>
        </div>

        <div id="adminOrdersView" class="grid lg:grid-cols-3 gap-12">
            <div class="lg:col-span-1 bg-[#0f172a] p-8 rounded-[2rem] border border-slate-800 h-fit">
                <h4 class="font-black mb-4 text-xs text-slate-500 uppercase">Packing Charge / Item</h4>
                <div class="flex gap-4">
                    <input type="number" id="pInput" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-4 text-white" placeholder="₹">
                    <button onclick="dbSetParcel()" class="bg-white text-slate-900 px-6 rounded-xl font-bold uppercase text-xs">Update</button>
                </div>
            </div>
            <div class="lg:col-span-2">
                <h3 class="text-2xl font-black mb-8 flex items-center gap-3">Incoming Orders <span class="h-2 w-2 rounded-full bg-orange-500"></span></h3>
                <div id="orderList" class="space-y-4"></div>
            </div>
        </div>

        <div id="adminMenuView" class="hidden grid lg:grid-cols-3 gap-12">
            <div class="lg:col-span-1 bg-[#0f172a] p-8 rounded-[2rem] border border-slate-800 h-fit">
                <h4 class="font-black mb-8 uppercase text-xs tracking-widest text-slate-500">Add New Dish</h4>
                <input type="text" id="mName" placeholder="Item Name" class="w-full bg-slate-900 border border-slate-800 p-4 mb-3 rounded-xl text-white">
                <input type="number" id="mPrice" placeholder="Price (₹)" class="w-full bg-slate-900 border border-slate-800 p-4 mb-3 rounded-xl text-white">
                <input type="text" id="mImg" placeholder="Image URL" class="w-full bg-slate-900 border border-slate-800 p-4 mb-6 rounded-xl text-white">
                <button onclick="dbAddMenuItem()" class="w-full bg-orange-600 text-white py-4 rounded-xl font-black uppercase tracking-widest">Add to Menu</button>
            </div>
            <div class="lg:col-span-2">
                <h3 class="text-2xl font-black mb-8">Live Menu Items</h3>
                <div id="adminMenuList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { 
        getFirestore, collection, addDoc, onSnapshot, doc, 
        updateDoc, setDoc, query, orderBy, deleteDoc 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC1TaWwgXTAoPmxwlSvcVqiFIr05KfLSAk",
        authDomain: "nighthunger-e55e1.firebaseapp.com",
        projectId: "nighthunger-e55e1",
        storageBucket: "nighthunger-e55e1.firebasestorage.app",
        messagingSenderId: "129732701448",
        appId: "1:129732701448:web:eb136b05c3e20414c590bd"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let cart = [];
    let parcelPrice = 0;
    let user = JSON.parse(localStorage.getItem('campusUser')) || null;
 
    window.addEventListener('keydown', (e) => {
        if (e.key === "Escape") {
            closeModal();
            const sidebar = document.getElementById('cartSidebar');
            if (!sidebar.classList.contains('translate-x-full')) toggleCart();
        }
    });

     
    onSnapshot(doc(db, "settings", "global"), (snap) => {
        if(snap.exists()) {
            parcelPrice = snap.data().parcel || 0;
            document.getElementById('parcelDisplay').innerText = `₹${parcelPrice}`;
            updateTotals();
        }
    });

    onSnapshot(collection(db, "menu"), (snap) => {
        const grid = document.getElementById('menuGrid');
        const adminGrid = document.getElementById('adminMenuList');
        grid.innerHTML = '';
        adminGrid.innerHTML = '';

        snap.forEach(d => {
            const item = d.data();
            const id = d.id;

           
            grid.innerHTML += `
                <div class="glass-card rounded-[2.5rem] overflow-hidden group hover:border-orange-500/50 transition-all duration-500">
                    <div class="h-48 overflow-hidden"><img src="${item.image}" class="h-full w-full object-cover"></div>
                    <div class="p-6">
                        <h3 class="font-bold text-white text-lg">${item.name}</h3>
                        <div class="flex justify-between items-center mt-4">
                            <span class="text-2xl font-black">₹${item.price}</span>
                            <button onclick="addToCart('${item.name}', ${item.price})" class="bg-orange-600 p-3 rounded-xl"><i class="fas fa-plus"></i></button>
                        </div>
                    </div>
                </div>`;

             
            adminGrid.innerHTML += `
                <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800 flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <img src="${item.image}" class="w-12 h-12 rounded-lg object-cover">
                        <div>
                            <p class="text-white font-bold">${item.name}</p>
                            <p class="text-orange-500 text-xs">₹${item.price}</p>
                        </div>
                    </div>
                    <button onclick="deleteMenuItem('${id}')" class="text-red-500 hover:bg-red-500/10 p-3 rounded-xl transition">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>`;
        });
    });
 
    window.toggleAdminView = (view) => {
        document.getElementById('adminOrdersView').classList.toggle('hidden', view !== 'orders');
        document.getElementById('adminMenuView').classList.toggle('hidden', view !== 'menu');
    };

    window.deleteMenuItem = async (id) => {
        if(confirm("Remove this item from the menu?")) {
            await deleteDoc(doc(db, "menu", id));
        }
    };

    window.dbAddMenuItem = async () => {
        const name = document.getElementById('mName').value;
        const price = Number(document.getElementById('mPrice').value);
        const image = document.getElementById('mImg').value;
        if(!name || !price) return alert("Fill required fields!");
        await addDoc(collection(db, "menu"), { name, price, image });
        alert("Added!");
        document.getElementById('mName').value = ''; document.getElementById('mPrice').value = '';
    };
 
    window.openModal = (type) => {
        document.getElementById('masterModal').classList.add('modal-active');
        document.getElementById('userFields').classList.toggle('hidden', type !== 'user');
        document.getElementById('adminFields').classList.toggle('hidden', type !== 'admin');
    };
    window.closeModal = () => document.getElementById('masterModal').classList.remove('modal-active');
    window.toggleCart = () => document.getElementById('cartSidebar').classList.toggle('translate-x-full');
    
     
</script>
</body>
</html>
