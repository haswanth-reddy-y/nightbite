 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE NIGHT BITE | Student Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .modal-active { display: flex !important; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-100 font-sans min-h-screen">

    <nav class="bg-orange-600 p-4 text-white shadow-xl flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-2xl font-black italic tracking-tighter">THE <span class="text-yellow-300 underline">NIGHT BITE</span></h1>
        <div class="flex items-center gap-4">
            <button onclick="openModal('admin')" class="hidden md:block text-xs uppercase font-bold border border-orange-300 px-2 py-1 rounded">Admin</button>
            <button id="userStatus" onclick="openModal('user')" class="bg-yellow-400 text-orange-950 px-4 py-1.5 rounded-full font-bold shadow-md hover:scale-105 transition">Sign In</button>
            <button onclick="toggleCart()" class="relative bg-orange-700 p-2 rounded-lg">
                <i class="fas fa-shopping-basket text-xl"></i>
                <span id="cartCount" class="absolute -top-2 -right-2 bg-white text-orange-600 text-[10px] font-bold rounded-full h-5 w-5 flex items-center justify-center border-2 border-orange-600">0</span>
            </button>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        <div class="flex items-center justify-between mb-8">
            <h2 class="text-3xl font-extrabold text-slate-800">Fresh Menu 🥗</h2>
            <p class="text-sm text-slate-500 bg-white px-3 py-1 rounded-full shadow-sm">Fast delivery to Hostels</p>
        </div>
        
        <div id="menuGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            <p class="text-slate-400 animate-pulse">Connecting to kitchen...</p>
        </div>
    </main>

    <div id="cartSidebar" class="fixed inset-y-0 right-0 w-full max-w-sm bg-white shadow-2xl translate-x-full transition-transform duration-300 z-[100] flex flex-col">
        <div class="p-6 border-b flex justify-between items-center bg-slate-50">
            <h2 class="text-xl font-bold uppercase tracking-widest">Your Tray</h2>
            <button onclick="toggleCart()" class="text-3xl">&times;</button>
        </div>
        <div id="cartList" class="flex-grow overflow-y-auto p-6 space-y-4"></div>
        <div class="p-6 border-t bg-slate-50 space-y-3">
            <div class="flex justify-between text-slate-500">
                <span>Parcel Fee (per item)</span>
                <span id="parcelDisplay">₹0</span>
            </div>
            <div class="flex justify-between text-2xl font-black text-orange-600">
                <span>TOTAL</span>
                <span id="totalDisplay">₹0</span>
            </div>
            <button onclick="placeOrder()" class="w-full bg-green-500 text-white py-4 rounded-xl font-bold text-lg hover:bg-green-600 shadow-lg">ORDER NOW</button>
        </div>
    </div>

    <div id="masterModal" class="fixed inset-0 bg-black/60 z-[200] hidden items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 w-full max-w-md relative shadow-2xl">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-2xl">&times;</button>
            
            <div id="userFields" class="hidden">
                <h3 class="text-2xl font-bold mb-6">Create Student Account</h3>
                <input type="text" id="uName" placeholder="Name" class="w-full p-3 mb-3 border rounded-xl">
                <input type="tel" id="uPhone" placeholder="Mobile Number" class="w-full p-3 mb-3 border rounded-xl">
                <input type="password" id="uPass" placeholder="Password" class="w-full p-3 mb-6 border rounded-xl">
                <button onclick="registerUser()" class="w-full bg-orange-600 text-white py-3 rounded-xl font-bold">Sign Up</button>
            </div>

            <div id="adminFields" class="hidden">
                <h3 class="text-2xl font-bold mb-6 text-blue-900 text-center">Admin Access</h3>
                <input type="text" id="aID" placeholder="Admin ID" class="w-full p-3 mb-3 border rounded-xl">
                <input type="password" id="aPass" placeholder="Password" class="w-full p-3 mb-6 border rounded-xl">
                <button onclick="verifyAdmin()" class="w-full bg-blue-900 text-white py-3 rounded-xl font-bold">Login</button>
            </div>
        </div>
    </div>

    <div id="adminDash" class="fixed inset-0 bg-slate-50 z-[300] hidden overflow-y-auto p-6">
        <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-10 border-b pb-4">
                <h2 class="text-3xl font-black">ADMIN CONTROL</h2>
                <button onclick="location.reload()" class="bg-red-500 text-white px-6 py-2 rounded-full font-bold">Logout</button>
            </div>

            <div class="grid lg:grid-cols-3 gap-10">
                <div class="lg:col-span-1 bg-white p-6 rounded-3xl shadow-xl border border-slate-200 h-fit">
                    <h4 class="font-bold mb-4 uppercase text-slate-400">Add Menu Item</h4>
                    <input type="text" id="mName" placeholder="Item Name" class="w-full p-3 mb-3 border rounded-lg">
                    <input type="number" id="mPrice" placeholder="Price (₹)" class="w-full p-3 mb-3 border rounded-lg">
                    <input type="text" id="mImg" placeholder="Image URL (e.g. Unsplash)" class="w-full p-3 mb-4 border rounded-lg">
                    <button onclick="dbAddMenuItem()" class="w-full bg-orange-600 text-white py-3 rounded-xl mb-6">Publish to Menu</button>
                    
                    <div class="pt-6 border-t">
                        <h4 class="font-bold mb-2">Global Parcel Charge (₹)</h4>
                        <div class="flex gap-2">
                            <input type="number" id="pInput" class="w-24 border rounded p-2" value="0">
                            <button onclick="dbSetParcel()" class="bg-black text-white px-4 rounded">Update All</button>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-2">
                    <h3 class="text-2xl font-bold mb-6 flex items-center gap-3">Live Orders <span class="bg-orange-500 text-white text-sm px-2 py-1 rounded-full animate-pulse">Real-time</span></h3>
                    <div id="orderList" class="space-y-4"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBV2EnvHVHMhH09Tl_pdoLL9rsyr78FWoc",
        authDomain: "nightbite-e11ae.firebaseapp.com",
        databaseURL: "https://nightbite-e11ae-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "nightbite-e11ae",
        storageBucket: "nightbite-e11ae.firebasestorage.app",
        messagingSenderId: "76062594463",
        appId: "1:76062594463:web:927e606ca31809abd959aa",
        measurementId: "G-BCPFL8L53M"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let cart = [];
    let parcelPrice = 0;
    let user = JSON.parse(localStorage.getItem('campusUser')) || null;

    if(user) document.getElementById('userStatus').innerText = `Hi, ${user.name}`;

    // Listeners
    onSnapshot(doc(db, "settings", "global"), (snap) => {
        if(snap.exists()) {
            parcelPrice = snap.data().parcel || 0;
            document.getElementById('parcelDisplay').innerText = `₹${parcelPrice}`;
            updateTotals();
        }
    });

    onSnapshot(collection(db, "menu"), (snap) => {
        const grid = document.getElementById('menuGrid');
        grid.innerHTML = '';
        snap.forEach(d => {
            const item = d.data();
            grid.innerHTML += `
                <div class="bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-2xl transition-all border border-slate-100 p-2">
                    <img src="${item.image}" class="h-48 w-full object-cover rounded-2xl mb-4">
                    <div class="px-3 pb-3">
                        <h3 class="font-black text-slate-800 text-lg">${item.name}</h3>
                        <div class="flex justify-between items-center mt-2">
                            <span class="text-2xl font-bold text-orange-600">₹${item.price}</span>
                            <button onclick="addToCart('${item.name}', ${item.price})" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-sm font-bold active:scale-95 transition">Add</button>
                        </div>
                    </div>
                </div>`;
        });
    });

    onSnapshot(collection(db, "orders"), (snap) => {
        const list = document.getElementById('orderList');
        list.innerHTML = '';
        snap.forEach(d => {
            const o = d.data();
            if(o.status === "pending") {
                list.innerHTML += `
                    <div class="bg-white p-6 rounded-2xl shadow-sm border-l-8 border-orange-500 flex justify-between items-center">
                        <div>
                            <h4 class="font-black text-xl">${o.userName} <span class="text-sm font-normal text-slate-400">| ${o.phone}</span></h4>
                            <p class="text-slate-600 mt-1">${o.foodItems.join(', ')}</p>
                            <span class="text-orange-600 font-bold text-lg">Bill: ₹${o.bill}</span>
                        </div>
                        <button onclick="confirmOrder('${d.id}', '${o.phone}', ${o.bill})" class="bg-green-500 text-white px-6 py-2 rounded-lg font-bold">ACCEPT</button>
                    </div>`;
            }
        });
    });

    // Modal & Cart UI Functions
    window.openModal = (type) => {
        document.getElementById('masterModal').classList.add('modal-active');
        document.getElementById('userFields').classList.toggle('hidden', type !== 'user');
        document.getElementById('adminFields').classList.toggle('hidden', type !== 'admin');
    }
    window.closeModal = () => document.getElementById('masterModal').classList.remove('modal-active');
    window.toggleCart = () => document.getElementById('cartSidebar').classList.toggle('translate-x-full');

    // Cart Logic
    window.addToCart = (name, price) => {
        cart.push({ name, price });
        renderCart();
    }

    window.renderCart = () => {
        const list = document.getElementById('cartList');
        list.innerHTML = cart.map((item, i) => `
            <div class="flex justify-between items-center border-b pb-2">
                <span class="font-bold">${item.name}</span>
                <button onclick="removeFromCart(${i})" class="text-red-500 font-bold">Remove</button>
            </div>`).join('');
        document.getElementById('cartCount').innerText = cart.length;
        updateTotals();
    }

    window.removeFromCart = (i) => {
        cart.splice(i, 1);
        renderCart();
    }

    window.updateTotals = () => {
        const foodTotal = cart.reduce((s, i) => s + i.price, 0);
        const total = foodTotal + (cart.length * parcelPrice);
        document.getElementById('totalDisplay').innerText = `₹${total}`;
    }

    // User Functions
    window.registerUser = async () => {
        const name = document.getElementById('uName').value;
        const phone = document.getElementById('uPhone').value;
        const pass = document.getElementById('uPass').value;
        if(!name || !phone) return alert("Enter details");
        user = { name, phone };
        await addDoc(collection(db, "users"), { ...user, pass });
        localStorage.setItem('campusUser', JSON.stringify(user));
        location.reload();
    }

    window.placeOrder = async () => {
        if(!user) return openModal('user');
        if(cart.length === 0) return alert("Cart empty");
        
        const finalBill = cart.reduce((s, i) => s + i.price, 0) + (cart.length * parcelPrice);
        await addDoc(collection(db, "orders"), {
            userName: user.name,
            phone: user.phone,
            foodItems: cart.map(i => i.name),
            bill: finalBill,
            status: "pending",
            createdAt: new Date()
        });
        alert("Order sent to kitchen!");
        cart = []; renderCart(); toggleCart();
    }

    // Admin Functions
    window.verifyAdmin = () => {
        const id = document.getElementById('aID').value;
        const pass = document.getElementById('aPass').value;
        
        // Updated Credentials
        if(id === "havi" && pass === "1234567890") {
            document.getElementById('adminDash').classList.remove('hidden');
            closeModal();
        } else {
            alert("Incorrect Admin ID or Password");
        }
    }

    window.dbAddMenuItem = async () => {
        const name = document.getElementById('mName').value;
        const price = Number(document.getElementById('mPrice').value);
        const image = document.getElementById('mImg').value;
        if(!name || !price) return alert("Enter item details");
        await addDoc(collection(db, "menu"), { name, price, image });
        alert("Menu Updated!");
    }

    window.dbSetParcel = async () => {
        const p = Number(document.getElementById('pInput').value);
        await setDoc(doc(db, "settings", "global"), { parcel: p });
        alert("Parcel charges updated!");
    }

    window.confirmOrder = async (id, phone, bill) => {
        await updateDoc(doc(db, "orders", id), { status: "accepted" });
        alert(`ORDER ACCEPTED\nBill of ₹${bill} confirmed for ${phone}`);
    }
</script>
</body>
</html>
