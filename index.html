<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE NIGHT HUNGER | SVEC@KINGS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&family=Metamorphous&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #22543d; --accent: #f6ad55; --accent-light: #feebc8; --dark: #1a202c;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--dark); color: white; margin: 0; overflow-x: hidden; }
        h1, h2, h3, h4, .logo { font-family: 'Metamorphous', serif; color: var(--accent-light); }
        
        .hidden { display: none !important; }
        .logout-btn { background: #e53e3e !important; width: auto !important; padding: 5px 15px !important; font-size: 0.8rem; margin-left: 10px; }
        .view-btn { background: #2b6cb0 !important; margin-left: 10px; padding: 5px 15px !important; font-size: 0.8rem; }
 
        .auth-container { display: flex; justify-content: center; align-items: center; height: 100vh; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1543353071-10c8ba85a904?auto=format&fit=crop&w=1350&q=80'); background-size: cover; background-position: center; }
        .glass-card { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(15px); padding: 40px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); width: 380px; text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white; outline: none; }
        
       
        button { padding: 12px; border-radius: 12px; border: none; background: linear-gradient(135deg, var(--primary), #38a169); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: rgba(15, 23, 42, 0.9); position: sticky; top: 0; z-index: 100; }
        .food-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding: 30px 5%; }
        .food-card { background: rgba(255, 255, 255, 0.05); border-radius: 20px; padding: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .food-card img { width: 100%; border-radius: 15px; height: 180px; object-fit: cover; }
        .price-tag { color: var(--accent); font-weight: bold; font-size: 1.3rem; margin: 10px 0; }
        
        .admin-banner { background: var(--accent); color: var(--dark); text-align: center; padding: 5px; font-weight: bold; font-size: 0.8rem; }
        .order-notification { background: #2d3748; padding: 15px; border-radius: 15px; margin-top: 10px; border-left: 5px solid var(--accent); }
        
        .parcel-setting-box { border: 2px dashed var(--accent); padding: 15px; border-radius: 15px; margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>

    <div id="admin-preview-bar" class="admin-banner hidden">
        EYES ONLY: Admin Preview Mode — <button onclick="toggleAdminView()" style="background:none; color:black; text-decoration:underline; padding:0; box-shadow:none; font-size:0.8rem;">Return to Panel</button>
    </div>

    <div id="login-layer" class="auth-container">
        <div class="glass-card" id="user-login-box">
            <h1 class="logo">THE NIGHT<span>HUNGER</span></h1>
            <input type="text" id="u-name" placeholder="Full Name">
            <input type="tel" id="u-phone" placeholder="Phone Number">
            <button onclick="mockSendOTP()">Request OTP</button>
            <div id="otp-area" class="hidden">
                <input type="text" id="u-otp" placeholder="Enter OTP (1234)">
                <button onclick="handleLogin('user')">Login</button>
            </div>
            <p onclick="switchLogin('admin')" style="cursor:pointer; font-size:0.8rem; margin-top:20px; color:var(--accent);">Admin Access</p>
        </div>

        <div class="glass-card hidden" id="admin-login-box">
            <h2>Admin Portal</h2>
            <input type="text" id="a-id" placeholder="Admin ID">
            <input type="password" id="a-pass" placeholder="Password">
            <button onclick="handleLogin('admin')">Login Admin</button>
            <p onclick="switchLogin('user')" style="cursor:pointer; font-size:0.8rem; margin-top:20px;">User View</p>
        </div>
    </div>

    <div id="user-dashboard" class="hidden">
        <nav class="navbar">
            <div class="logo">THE NIGHT<span>HUNGER</span></div>
            <div>
                <button onclick="checkout()">🛒 Checkout</button>
                <button id="logout-trigger" class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </nav>
        <div class="food-grid" id="menu-items"></div>
    </div>

    <div id="admin-dashboard" class="hidden">
        <div style="padding: 20px 5%;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h1>Admin Panel</h1>
                <div>
                    <button class="view-btn" onclick="toggleAdminView()">👁️ View UI</button>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
            </div>

            <div class="parcel-setting-box">
                <h4 style="margin:0 0 10px 0; color:var(--accent);">Global Parcel Settings</h4>
                <div style="display:flex; gap:10px; align-items:center; justify-content:center;">
                    <span>Extra Charge: ₹</span>
                    <input type="number" id="global-parcel-input" style="width:80px; margin:0;" value="15">
                    <button onclick="updateGlobalParcel()" style="padding:8px 15px; font-size:0.7rem;">Update All Items</button>
                </div>
                <small style="color:#aaa;">* This amount applies to all items in the menu.</small>
            </div>
            
            <div class="glass-card" style="width: 100%; text-align: left; background: #2d3748;">
                <h3>Add Food Item</h3>
                <input type="text" id="new-item-name" placeholder="Food Name">
                <input type="number" id="new-item-price" placeholder="Base Price (₹)">
                <input type="file" id="new-item-img" accept="image/*">
                <button onclick="addItem()" style="margin-top:10px;">Post Item</button>
            </div>

            <h2 style="margin-top:40px;">Recent Orders</h2>
            <div id="admin-order-list"><p>No orders yet.</p></div>
        </div>
    </div>

    <script>
 
        let currentParcelCharge = parseInt(localStorage.getItem('globalParcelCharge')) || 15;
        
        let menuItems = JSON.parse(localStorage.getItem('savedMenu')) || [
            { id: 1, name: "Chicken Biryani", price: 220, img: "https://images.unsplash.com/photo-1630409351241-e90e76d94132?w=400" },
            { id: 2, name: "Egg Fried Rice", price: 150, img: "https://images.unsplash.com/photo-1603133872878-684f208fb84b?w=400" }
        ];
        
        let currentCart = [];
        let isAdminPreview = false;

        window.onload = () => {
            const savedRole = localStorage.getItem('userRole');
            document.getElementById('global-parcel-input').value = currentParcelCharge;
            if (savedRole) enterApp(savedRole);
            renderAdminOrders();
        };
 
        function updateGlobalParcel() {
            const newVal = parseInt(document.getElementById('global-parcel-input').value);
            if (isNaN(newVal)) return alert("Enter a valid number");
            currentParcelCharge = newVal;
            localStorage.setItem('globalParcelCharge', newVal);
            alert("Parcel charges updated to ₹" + newVal + " for all items!");
            if(isAdminPreview) renderMenu();  
        }

        function handleLogin(role) {
            if (role === 'admin') {
                if(document.getElementById('a-id').value === "havi-reddy" && document.getElementById('a-pass').value === "123456789") {
                    localStorage.setItem('userRole', 'admin');
                    enterApp('admin');
                } else alert("Wrong credentials");
            } else {
                if(document.getElementById('u-otp').value === "1234") {
                    localStorage.setItem('userRole', 'user');
                    localStorage.setItem('userName', document.getElementById('u-name').value);
                    localStorage.setItem('userPhone', document.getElementById('u-phone').value);
                    enterApp('user');
                } else alert("Invalid OTP");
            }
        }

        function enterApp(role) {
            document.getElementById('login-layer').classList.add('hidden');
            document.getElementById(role + '-dashboard').classList.remove('hidden');
            if (role === 'user') renderMenu();
        }

        function toggleAdminView() {
            const userDash = document.getElementById('user-dashboard');
            const adminDash = document.getElementById('admin-dashboard');
            const previewBar = document.getElementById('admin-preview-bar');
            const logoutBtn = document.getElementById('logout-trigger');

            if (!isAdminPreview) {
                adminDash.classList.add('hidden');
                userDash.classList.remove('hidden');
                previewBar.classList.remove('hidden');
                logoutBtn.classList.add('hidden');
                renderMenu();
                isAdminPreview = true;
            } else {
                userDash.classList.add('hidden');
                adminDash.classList.remove('hidden');
                previewBar.classList.add('hidden');
                isAdminPreview = false;
            }
        }

        function logout() { localStorage.clear(); location.reload(); }

        function renderMenu() {
            const grid = document.getElementById('menu-items');
            grid.innerHTML = menuItems.map(item => `
                <div class="food-card">
                    <img src="${item.img}" alt="${item.name}">
                    <h3>${item.name}</h3>
                    <div class="price-tag">₹${item.price} <span style="font-size:0.8rem; color:gray;">+₹${currentParcelCharge} Parcel</span></div>
                    <button onclick="${isAdminPreview ? "alert('Preview Mode')" : `addToCart(${item.id})`}">Add to Cart</button>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const item = menuItems.find(i => i.id === id);
            currentCart.push(item);
            alert(item.name + " added!");
        }

        function checkout() {
            if(isAdminPreview) return alert("Preview Mode");
            if(currentCart.length === 0) return alert("Cart empty");
            const orderData = {
                user: localStorage.getItem('userName'),
                phone: localStorage.getItem('userPhone'),
                items: currentCart,
                total: currentCart.reduce((sum, item) => sum + item.price + currentParcelCharge, 0)
            };
            let orders = JSON.parse(localStorage.getItem('pendingOrders')) || [];
            orders.push(orderData);
            localStorage.setItem('pendingOrders', JSON.stringify(orders));
            alert("Order placed! Notify Admin.");
            currentCart = [];
        }

        function addItem() {
            const name = document.getElementById('new-item-name').value;
            const price = parseInt(document.getElementById('new-item-price').value);
            const imgInput = document.getElementById('new-item-img');

            if (name && price && imgInput.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    menuItems.push({ id: Date.now(), name, price, img: e.target.result });
                    localStorage.setItem('savedMenu', JSON.stringify(menuItems));
                    alert("Food Posted!");
                    location.reload();
                };
                reader.readAsDataURL(imgInput.files[0]);
            } else alert("Fill all fields");
        }

        function renderAdminOrders() {
            const container = document.getElementById('admin-order-list');
            const orders = JSON.parse(localStorage.getItem('pendingOrders')) || [];
            if(orders.length === 0) return;
            container.innerHTML = orders.map((order, index) => `
                <div class="order-notification">
                    <p><strong>Customer:</strong> ${order.user} (${order.phone})</p>
                    <p><strong>Total (inc. ₹${currentParcelCharge} fee/item):</strong> ₹${order.total}</p>
                    <button onclick="acceptOrder(${index})">✅ Accept & Bill</button>
                </div>
            `).join('');
        }

        function acceptOrder(index) {
            const orders = JSON.parse(localStorage.getItem('pendingOrders'));
            const order = orders[index];
            const billText = `THE NIGHT HUNGER BILL%0A-----------------%0AUser: ${order.user}%0AItems: ${order.items.map(i => i.name).join(', ')}%0AParcel Fee: ₹${currentParcelCharge} per item%0ATotal: ₹${order.total}`;
            window.open(`https://wa.me/91${order.phone}?text=${billText}`, '_blank');
            orders.splice(index, 1);
            localStorage.setItem('pendingOrders', JSON.stringify(orders));
            renderAdminOrders();
        }

        function switchLogin(type) {
            document.getElementById('user-login-box').classList.toggle('hidden', type === 'admin');
            document.getElementById('admin-login-box').classList.toggle('hidden', type === 'user');
        }

        function mockSendOTP() { document.getElementById('otp-area').classList.remove('hidden'); alert("OTP: 1234"); }
    </script>
</body>
</html>
