<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE NIGHT HUNGER | SVEC@KINGS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&family=Metamorphous&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #22543d;  
            --accent: #f6ad55;  
            --accent-light: #feebc8;  
            --dark: #1a202c;
            --glass: rgba(255, 255, 255, 0.1);
            
            --parcel-fee: " + ₹15"; 
        }

        
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--dark); color: white; margin: 0; overflow-x: hidden; }
        h1, h2, h3, h4, .logo { font-family: 'Metamorphous', serif; color: var(--accent-light); }
        .auth-container { display: flex; justify-content: center; align-items: center; height: 100vh; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1543353071-10c8ba85a904?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80'); background-size: cover; background-position: center; }
        .glass-card { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(15px); padding: 40px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); width: 380px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white; outline: none; }
        button { width: 100%; padding: 12px; border-radius: 12px; border: none; background: linear-gradient(135deg, var(--primary), #38a169); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: rgba(15, 23, 42, 0.9); position: sticky; top: 0; z-index: 100; }
        .logo span { color: var(--accent); }
        .nav-cats { display: flex; gap: 15px; overflow-x: auto; padding: 20px 5%; background: #2d3748; }
        .cat-btn { background: var(--glass); padding: 10px 25px; border-radius: 25px; font-size: 0.9rem; width: auto; border: 1px solid rgba(255,255,255,0.1); color: white;}
        .food-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding: 30px 5%; }
        .food-card { background: rgba(255, 255, 255, 0.05); border-radius: 20px; padding: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .food-card img { width: 100%; border-radius: 15px; height: 180px; object-fit: cover; }
        .price-tag { color: var(--accent); font-weight: bold; font-size: 1.3rem; margin: 10px 0; display: flex; flex-direction: column; align-items: flex-start; }
        .special-badge { background: var(--accent); color: #1a202c; padding: 3px 10px; border-radius: 5px; font-size: 0.75rem; font-weight: bold; margin-top: 5px; }
        .hidden { display: none !important; }
        .parcel-info { font-size: 0.7rem; color: #a0aec0; font-weight: normal; }
    </style>
</head>
<body>

    <div id="login-layer" class="auth-container">
        <div class="glass-card" id="user-login-box">
            <h1 class="logo">THE NIGHT<span>HUNGER</span></h1>
            <h2>Namaskaram!</h2>
            <input type="text" id="u-name" placeholder="User Name">
            <input type="tel" id="u-phone" placeholder="Phone Number">
            <button onclick="mockSendOTP()">Request OTP</button>
            <div id="otp-area" class="hidden">
                <input type="text" id="u-otp" placeholder="Enter OTP (1234)">
                <button onclick="enterApp('user')">Verify & Enter</button>
            </div>
            <p onclick="switchLogin('admin')" style="cursor:pointer; font-size:0.8rem; margin-top:20px;">Admin Login</p>
        </div>

        <div class="glass-card hidden" id="admin-login-box">
            <h2>Admin Portal</h2>
            <input type="text" id="a-id" placeholder="Admin ID">
            <input type="password" id="a-pass" placeholder="Password">
            <button onclick="enterApp('admin')">Login as Admin</button>
            <p onclick="switchLogin('user')" style="cursor:pointer; font-size:0.8rem; margin-top:20px;">Back to Menu</p>
        </div>
    </div>

    <div id="user-dashboard" class="hidden">
        <nav class="navbar">
            <div class="logo">THE NIGHT<span>HUNGER</span></div>
            <input type="text" id="search" placeholder="Search food..." style="width: 30%; margin: 0;">
            <button class="cat-btn" style="background: var(--primary);">🛒 Basket (0)</button>
        </nav>
        
        <div class="nav-cats" id="category-bar">
            </div>

        <div class="food-grid" id="menu-items">
            </div>
    </div>

    <div id="admin-dashboard" class="hidden">
        <div style="padding: 20px 5%;">
            <h1>Admin Dashboard</h1>
            <div class="glass-card" style="width: 100%; text-align: left; background: #2d3748; margin-bottom: 20px;">
                <h3>Add New Item</h3>
                <input type="text" id="new-item-name" placeholder="Item Name">
                <select id="new-item-cat">
                    <option>Biryanis</option>
                    <option>Fried Rice</option>
                    <option>Snacks & Drinks</option>
                </select>
                <input type="number" id="new-item-price" placeholder="Base Price (₹)">
                <p style="font-size: 0.8rem; color: var(--accent);">* Default Parcel Charge (₹15) will be added automatically.</p>
                <button onclick="addItem()">Add to Menu</button>
            </div>
        </div>
    </div>

    <script>
         
        const DEFAULT_PARCEL_CHARGE = 15;  

         
        const menuItems = [
            { name: "Chicken Biryani", price: 220, cat: "Biryanis", img: "https://images.unsplash.com/photo-1630409351241-e90e76d94132?w=400" },
            { name: "Egg Fried Rice", price: 150, cat: "Fried Rice", img: "https://images.unsplash.com/photo-1603133872878-684f208fb84b?w=400" }
        ];

        function renderMenu() {
            const grid = document.getElementById('menu-items');
            grid.innerHTML = menuItems.map(item => `
                <div class="food-card">
                    <img src="${item.img}" alt="${item.name}">
                    <h3>${item.name}</h3>
                    <div class="price-tag">
                        ₹${item.price} 
                        <span class="parcel-info">+ ₹${DEFAULT_PARCEL_CHARGE} Parcel Fee</span>
                        <span class="special-badge">Total Parcel: ₹${item.price + DEFAULT_PARCEL_CHARGE}</span>
                    </div>
                    <button>Add to Cart</button>
                </div>
            `).join('');
        }

        
        function switchLogin(type) {
            document.getElementById('user-login-box').classList.toggle('hidden', type === 'admin');
            document.getElementById('admin-login-box').classList.toggle('hidden', type === 'user');
        }

        function mockSendOTP() {
            document.getElementById('otp-area').classList.remove('hidden');
            alert("Mock OTP: 1234");
        }

        function enterApp(role) {
            if (role === 'admin') {
                const id = document.getElementById('a-id').value;
                const pass = document.getElementById('a-pass').value;
                if(id === "havi-reddy" && pass === "123456789") {
                    showDashboard('admin');
                } else { alert("Wrong Admin Credentials"); }
            } else {
                showDashboard('user');
                renderMenu();
            }
        }

        function showDashboard(role) {
            document.getElementById('login-layer').classList.add('hidden');
            document.getElementById(role + '-dashboard').classList.remove('hidden');
        }

        function confirmOrder(userName, phone) {
             
            const message = `Vanakkam ${userName}! Your order has been confirmed. Total includes a ₹${DEFAULT_PARCEL_CHARGE} parcel charge per item. Enjoy!`;
            const whatsappUrl = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
            window.open(whatsappUrl, '_blank');
        }

        function addItem() {
            const name = document.getElementById('new-item-name').value;
            const price = parseInt(document.getElementById('new-item-price').value);
            if(name && price) {
                const parcelTotal = price + DEFAULT_PARCEL_CHARGE;
                alert(`${name} added! \nBase: ₹${price} \nParcel Total: ₹${parcelTotal}`);
            }
        }
    </script>
</body>
</html>
