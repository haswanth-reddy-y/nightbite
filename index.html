 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE NIGHT BITE | Student Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .modal-active { display: flex !important; }
        .glass-nav { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(255,255,255,0.08); }
        .glass-card { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.05); }
        .gradient-text { background: linear-gradient(90deg, #38bdf8, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-glow:hover { box-shadow: 0 0 20px rgba(249, 115, 22, 0.4); transform: translateY(-2px); }
     
        .menu-card { position: relative; overflow: hidden; transition: all 0.5s ease; }
        .menu-card:hover { transform: translateY(-10px); }
        .hover-overlay {
            position: absolute; inset: 0; background: rgba(249, 115, 22, 0.15);
            backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: all 0.3s ease; z-index: 10; pointer-events: none;
        }
        .menu-card:hover .hover-overlay { opacity: 1; }
        .quick-tag { 
            background: white; color: #ea580c; padding: 6px 15px; border-radius: 99px; 
            font-weight: 800; font-size: 10px; text-transform: uppercase;
            transform: translateY(20px); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .menu-card:hover .quick-tag { transform: translateY(0); }

        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-5px); } 100% { transform: translateY(0px); } }
        .animate-float { animation: float 3s ease-in-out infinite; }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 min-h-screen selection:bg-orange-500/30">

    <nav class="glass-nav p-4 flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-2xl font-black italic tracking-tighter uppercase">
            THE <span class="gradient-text">NIGHT BITE</span>
        </h1>
        <div class="flex items-center gap-5">
            <button onclick="openModal('admin')" class="text-[10px] tracking-widest uppercase font-bold text-slate-500 hover:text-orange-400 transition-colors hidden md:block">Staff Access</button>
            <div class="flex items-center gap-2">
                <button id="userStatus" onclick="openModal('user')" class="bg-slate-800/80 text-white px-5 py-2 rounded-xl font-semibold border border-slate-700 hover:border-orange-500/50">Sign In</button>
                <button id="signOutBtn" onclick="signOutUser()" class="hidden bg-red-500/10 text-red-500 p-2.5 rounded-xl border border-red-500/20 hover:bg-red-500 hover:text-white transition-all">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
            <button onclick="toggleCart()" class="relative bg-orange-600 p-2.5 rounded-xl btn-glow">
                <i class="fas fa-shopping-basket text-xl text-white"></i>
                <span id="cartCount" class="absolute -top-2 -right-2 bg-white text-orange-600 text-[10px] font-black rounded-full h-5 w-5 flex items-center justify-center border-2 border-orange-600">0</span>
            </button>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-10">
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-16 gap-6">
            <div class="animate-float">
                <h2 class="text-5xl font-black text-white mb-3 tracking-tight">Midnight <span class="text-orange-500">Fuel.</span> 🍔</h2>
                <p class="text-slate-400 text-lg">Your hostel wing's favorite late-night kitchen.</p>
            </div>
            <div class="bg-slate-900/80 border border-slate-800 p-3 rounded-2xl flex items-center gap-4">
                <div class="flex h-4 w-4 rounded-full bg-green-500 animate-pulse"></div>
                <span class="text-sm font-bold text-green-400">Taking Live Orders</span>
            </div>
        </div>
        <div id="menuGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
    </main>

    <div id="adminDash" class="fixed inset-0 bg-[#020617] z-[300] hidden overflow-y-auto p-8">
        <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-12 border-b border-slate-800 pb-8">
                <h2 class="text-3xl font-black tracking-tighter uppercase">ADMIN <span class="text-orange-500">CONSOLE</span></h2>
                <div class="flex gap-4">
                    <button onclick="toggleAdminView('orders')" class="bg-slate-800 text-white px-6 py-3 rounded-xl font-bold hover:bg-orange-600">Orders</button>
                    <button onclick="toggleAdminView('menu')" class="bg-slate-800 text-white px-6 py-3 rounded-xl font-bold hover:bg-orange-600">Menu Manager</button>
                    <button onclick="location.reload()" class="bg-red-500/10 text-red-500 px-8 py-3 rounded-xl border border-red-500/20">Logout</button>
                </div>
            </div>

           <div class="lg:col-span-1 bg-[#0f172a] p-8 rounded-[2rem] border border-slate-800 h-fit sticky top-8">
    <h4 class="font-black mb-6 uppercase text-xs text-slate-500">Add New Dish</h4>
    <input type="text" id="mName" placeholder="Dish Name" class="w-full bg-slate-900 border border-slate-800 p-4 mb-3 rounded-xl text-white outline-none">
    
    <div class="flex gap-2 mb-3">
        <input type="number" id="mPrice" placeholder="Reg. Price" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-xl text-white outline-none">
        <input type="number" id="mSpecialPrice" placeholder="Special (Optional)" class="w-full bg-slate-900 border border-orange-500/30 p-4 rounded-xl text-white outline-none">
    </div>
    
    <select id="mCategory" class="w-full bg-slate-900 border border-slate-800 p-4 mb-3 rounded-xl text-white outline-none">
        <option value="Biryanis">Biryanis 🍛</option>
        <option value="Noodles">Noodles 🍜</option>
        <option value="Fried Rice">Fried Rice 🍚</option>
        <option value="Starters">Starters 🍗</option>
    </select>
    
    <input type="text" id="mImg" placeholder="Image URL" class="w-full bg-slate-900 border border-slate-800 p-4 mb-6 rounded-xl text-white outline-none">
    <button onclick="dbAddMenuItem()" class="w-full bg-orange-600 text-white py-4 rounded-xl font-black uppercase">Add to Menu</button>
</div>

                     
                
             <div class="lg:col-span-2">
                    <div class="mb-8 relative">
                        <input type="text" id="adminSearch" oninput="searchMenu()" placeholder="Search menu items..." class="w-full bg-slate-900 border border-slate-800 p-4 pl-12 rounded-2xl text-white outline-none focus:border-orange-500">
                        <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-500"></i>
                    </div>
                    <div id="adminMenuList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>
            </div>

            <div id="adminOrdersView" class="grid lg:grid-cols-3 gap-12">
                <div class="lg:col-span-3" id="orderList"></div>
            </div>
        </div>
    </div>

    <div id="cartSidebar" class="fixed inset-y-0 right-0 w-full max-w-sm bg-[#0f172a] translate-x-full transition-transform z-[100] border-l border-slate-800 flex flex-col">
        <div class="p-6 border-b border-slate-800 flex justify-between items-center"><h2 class="text-white font-black">YOUR TRAY</h2><button onclick="toggleCart()" class="text-white text-2xl">&times;</button></div>
        <div id="cartList" class="flex-grow p-6 overflow-y-auto space-y-4"></div>
        <div class="p-6 border-t border-slate-800">
            <div class="flex justify-between mb-4"><span class="text-slate-400">Total</span><span id="totalDisplay" class="text-2xl font-black text-white">₹0</span></div>
            <button onclick="placeOrder()" class="w-full bg-orange-600 py-4 rounded-xl font-black uppercase">Blast Order</button>
        </div>
    </div>

    <div id="masterModal" class="fixed inset-0 bg-[#020617]/95 z-[200] hidden items-center justify-center p-4">
        <div class="bg-[#0f172a] rounded-[2.5rem] p-10 w-full max-w-md relative border border-slate-800">
            <button onclick="closeModal()" class="absolute top-8 right-8 text-white">&times;</button>
            <div id="userFields" class="hidden">
                <h3 class="text-white text-2xl font-black mb-6">Student Sign-In</h3>
                <input type="text" id="uName" placeholder="Full Name" class="w-full bg-slate-900 p-4 mb-3 rounded-xl border border-slate-800 text-white"><input type="tel" id="uPhone" placeholder="Phone" class="w-full bg-slate-900 p-4 mb-3 rounded-xl border border-slate-800 text-white"><input type="password" id="uPass" placeholder="Password" class="w-full bg-slate-900 p-4 mb-6 rounded-xl border border-slate-800 text-white"><button onclick="registerUser()" class="w-full bg-orange-600 py-4 rounded-xl text-white font-black">Enter Kitchen</button>
            </div>
            <div id="adminFields" class="hidden">
                <h3 class="text-white text-2xl font-black mb-6">Staff Access</h3>
                <input type="text" id="aID" placeholder="Admin ID" class="w-full bg-slate-900 p-4 mb-3 rounded-xl border border-slate-800 text-white"><input type="password" id="aPass" placeholder="Password" class="w-full bg-slate-900 p-4 mb-6 rounded-xl border border-slate-800 text-white"><button onclick="verifyAdmin()" class="w-full bg-orange-600 py-4 rounded-xl text-white font-black">Login</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC1TaWwgXTAoPmxwlSvcVqiFIr05KfLSAk",
            authDomain: "nighthunger-e55e1.firebaseapp.com",
            projectId: "nighthunger-e55e1",
            storageBucket: "nighthunger-e55e1.firebasestorage.app",
            messagingSenderId: "129732701448",
            appId: "1:129732701448:web:eb136b05c3e20414c590bd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let menuData = [];
        let cart = [];
        let user = JSON.parse(localStorage.getItem('campusUser')) || null;
 
        onSnapshot(collection(db, "menu"), (snap) => {
            const grid = document.getElementById('menuGrid');
            const adminList = document.getElementById('adminMenuList');
            grid.innerHTML = '';
            adminList.innerHTML = '';
            menuData = [];

            snap.forEach(d => {
                const item = d.data();
                const id = d.id;
                menuData.push({ id, ...item });
    
                grid.innerHTML += `
                    <div class="menu-card glass-card rounded-[2.5rem] group">
                        <div class="hover-overlay">
                            <span class="quick-tag">Quick Add +</span>
                        </div>
                        <div class="h-48 overflow-hidden"><img src="${item.image}" class="h-full w-full object-cover transition duration-700 group-hover:scale-110"></div>
                        <div class="p-8">
                            <span class="text-[10px] text-orange-500 font-bold uppercase tracking-widest">${item.category || 'Food'}</span>
                            <h3 class="font-bold text-white text-xl mb-4">${item.name}</h3>
                            <div class="flex justify-between items-center">
                                <span class="text-2xl font-black text-white">₹${item.price}</span>
                                <button onclick="addToCart('${item.name}', ${item.price})" class="relative z-20 bg-orange-600 text-white h-10 w-10 rounded-xl flex items-center justify-center"><i class="fas fa-plus"></i></button>
                            </div>
                        </div>
                    </div>`;
                renderAdminItem(id, item);
            });
        });
 
        window.searchMenu = () => {
            const term = document.getElementById('adminSearch').value.toLowerCase();
            const adminList = document.getElementById('adminMenuList');
            adminList.innerHTML = '';
            menuData.filter(i => i.name.toLowerCase().includes(term) || i.category?.toLowerCase().includes(term))
                    .forEach(i => renderAdminItem(i.id, i));
        };

        function renderAdminItem(id, item) {
            const adminList = document.getElementById('adminMenuList');
            adminList.innerHTML += `
                <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800 flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <img src="${item.image}" class="w-12 h-12 rounded-lg object-cover">
                        <div>
                            <p class="text-white font-bold text-sm">${item.name}</p>
                            <p class="text-slate-500 text-[10px] uppercase">${item.category}</p>
                        </div>
                    </div>
                    <button onclick="deleteMenuItem('${id}')" class="text-red-500 p-2"><i class="fas fa-trash"></i></button>
                </div>`;
        }

        
window.dbAddMenuItem = async () => {
    const n = document.getElementById('mName'), 
          p = document.getElementById('mPrice'), 
          sp = document.getElementById('mSpecialPrice'),  
          c = document.getElementById('mCategory'), 
          i = document.getElementById('mImg');

    if(!n.value || !p.value) return alert("Missing name or regular price!");

    await addDoc(collection(db, "menu"), { 
        name: n.value, 
        price: Number(p.value), 
        specialPrice: sp.value ? Number(sp.value) : null, 
        category: c.value, 
        image: i.value 
    });

    n.value = ''; p.value = ''; sp.value = ''; i.value = '';
    alert("Added successfully!");
};

 
onSnapshot(collection(db, "menu"), (snap) => {
    const grid = document.getElementById('menuGrid');
    grid.innerHTML = '';
    snap.forEach(d => {
        const item = d.data();
        const finalPrice = item.specialPrice || item.price; 
        const hasDiscount = item.specialPrice && item.specialPrice < item.price;

        grid.innerHTML += `
            <div class="menu-card glass-card rounded-[2.5rem] group relative">
                ${hasDiscount ? `<span class="absolute top-4 left-4 z-20 bg-orange-500 text-white text-[10px] font-black px-3 py-1 rounded-full animate-pulse uppercase">Offer</span>` : ''}
                <div class="hover-overlay"><span class="quick-tag">Quick Add +</span></div>
                <div class="h-48 overflow-hidden"><img src="${item.image}" class="h-full w-full object-cover"></div>
                <div class="p-8">
                    <span class="text-[10px] text-orange-500 font-bold uppercase">${item.category}</span>
                    <h3 class="font-bold text-white text-xl mb-4">${item.name}</h3>
                    <div class="flex justify-between items-center">
                        <div>
                            ${hasDiscount ? `<span class="text-xs text-slate-500 line-through mr-2">₹${item.price}</span>` : ''}
                            <span class="text-2xl font-black text-white">₹${finalPrice}</span>
                        </div>
                        <button onclick="addToCart('${item.name}', ${finalPrice})" class="bg-orange-600 text-white h-10 w-10 rounded-xl flex items-center justify-center"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
            </div>`;
    });
});
 
        window.signOutUser = () => { localStorage.removeItem('campusUser'); location.reload(); };
        window.addEventListener('keydown', (e) => { if (e.key === "Escape") closeModal(); });
        
        window.toggleAdminView = (v) => {
            document.getElementById('adminOrdersView').classList.toggle('hidden', v !== 'orders');
            document.getElementById('adminMenuView').classList.toggle('hidden', v !== 'menu');
        };
 
        window.addToCart = (n, p) => { cart.push({n, p}); updateTotals(); toggleCart(); };
        window.updateTotals = () => { document.getElementById('totalDisplay').innerText = `₹${cart.reduce((s,i)=>s+i.p,0)}`; document.getElementById('cartCount').innerText = cart.length; };
        window.openModal = (t) => { document.getElementById('masterModal').classList.add('modal-active'); document.getElementById('userFields').classList.toggle('hidden', t!=='user'); document.getElementById('adminFields').classList.toggle('hidden', t!=='admin'); };
        window.closeModal = () => document.getElementById('masterModal').classList.remove('modal-active');
        window.toggleCart = () => document.getElementById('cartSidebar').classList.toggle('translate-x-full');
        window.verifyAdmin = () => { if(document.getElementById('aID').value==="havi" && document.getElementById('aPass').value==="1234567890") { document.getElementById('adminDash').classList.remove('hidden'); closeModal(); } };
        window.deleteMenuItem = async (id) => { if(confirm("Remove?")) await deleteDoc(doc(db, "menu", id)); };
    </script>
</body>
</html>
