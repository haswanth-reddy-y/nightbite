<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE NIGHT HUNGER | SVEC@KINGS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans">

    <nav class="bg-orange-500 p-4 text-white flex justify-between items-center sticky top-0 z-50 shadow-lg">
        <h1 class="text-2xl font-bold tracking-tight">THE NIGHT HUNGER</h1>
        <div class="space-x-4">
            <button onclick="toggleModal('adminLogin')" class="text-sm border border-white px-3 py-1 rounded hover:bg-white hover:text-orange-500 transition">Admin Login</button>
            <button onclick="toggleModal('userLogin')" id="userBtn" class="bg-yellow-400 text-orange-900 px-4 py-1 rounded-full font-bold">Sign In</button>
            <button onclick="toggleCart()" class="relative">
                <i class="fas fa-shopping-cart text-2xl"></i>
                <span id="cartCount" class="absolute -top-2 -right-2 bg-red-600 text-xs rounded-full px-1.5">0</span>
            </button>
        </div>
    </nav>

    <main class="container mx-auto p-6">
        <h2 class="text-3xl font-extrabold text-gray-800 mb-8">Grab Your Meal 🍔</h2>
        
        <div id="menuGrid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
            </div>
    </main>

    <div id="cartSidebar" class="fixed right-0 top-0 h-full w-80 bg-white shadow-2xl transform translate-x-full transition-transform z-[60] p-6">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold">Your Order</h2>
            <button onclick="toggleCart()" class="text-gray-500 text-2xl">&times;</button>
        </div>
        <div id="cartItems" class="space-y-4 max-h-[60vh] overflow-y-auto">
            </div>
        <div class="border-t mt-6 pt-4">
            <div class="flex justify-between text-sm text-gray-600">
                <span>Parcel Charges (per item):</span>
                <span id="parcelChargeDisplay">₹0</span>
            </div>
            <div class="flex justify-between text-xl font-bold mt-2">
                <span>Total:</span>
                <span id="totalBill">₹0</span>
            </div>
            <button onclick="placeOrder()" class="w-full bg-green-600 text-white py-3 rounded-lg mt-4 font-bold hover:bg-green-700">Place Order</button>
        </div>
    </div>

    <div id="adminPortal" class="hidden fixed inset-0 bg-white z-[100] p-8 overflow-y-auto">
        <div class="flex justify-between border-b pb-4 mb-6">
            <h2 class="text-2xl font-bold">Admin Dashboard</h2>
            <button onclick="closeAdmin()" class="bg-red-500 text-white px-4 py-1 rounded">Logout</button>
        </div>
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
            <div class="bg-gray-100 p-6 rounded-xl">
                <h3 class="font-bold mb-4">Add New Item</h3>
                <input type="text" id="itemName" placeholder="Item Name" class="w-full p-2 mb-2 rounded border">
                <input type="number" id="itemPrice" placeholder="Price" class="w-full p-2 mb-2 rounded border">
                <input type="text" id="itemImg" placeholder="Image URL" class="w-full p-2 mb-2 rounded border">
                <button onclick="addItem()" class="bg-blue-600 text-white px-6 py-2 rounded">Add to Menu</button>
                
                <div class="mt-4 border-t pt-4">
                    <label class="block font-bold">Set Universal Parcel Charge (₹)</label>
                    <input type="number" id="parcelInput" class="border p-2 w-24 rounded">
                    <button onclick="setParcelCharge()" class="bg-gray-800 text-white px-4 py-2 rounded">Update</button>
                </div>
            </div>

            <div>
                <h3 class="font-bold mb-4 text-orange-600">Pending Notifications 🔔</h3>
                <div id="orderNotifications" class="space-y-4">
                    </div>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
