<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE NIGHT HUNGER | SVEC@KINGS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&family=Metamorphous&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #22543d;  
            --accent: #f6ad55;  
            --accent-light: #feebc8;  
            --dark: #1a202c;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--dark); color: white; margin: 0; overflow-x: hidden; }
        h1, h2, h3, h4, .logo { font-family: 'Metamorphous', serif; color: var(--accent-light); }
        
        /* Layout */
        .hidden { display: none !important; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: rgba(15, 23, 42, 0.9); position: sticky; top: 0; z-index: 100; }
        .logo span { color: var(--accent); }
        
        /* Category Bar */
        .nav-cats { display: flex; gap: 15px; overflow-x: auto; padding: 15px 5%; background: #2d3748; scrollbar-width: none; }
        .cat-btn { background: var(--glass); padding: 8px 20px; border-radius: 20px; font-size: 0.8rem; width: auto; border: 1px solid rgba(255,255,255,0.1); color: white; cursor: pointer; white-space: nowrap; }
        
        /* Food Grid */
        .food-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding: 30px 5%; }
        .food-card { background: rgba(255, 255, 255, 0.05); border-radius: 20px; padding: 15px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .food-card img { width: 100%; border-radius: 15px; height: 180px; object-fit: cover; }
        .price-tag { color: var(--accent); font-weight: bold; font-size: 1.2rem; margin: 10px 0; display: block; }
        .parcel-info { font-size: 0.7rem; color: #a0aec0; display: block; margin-bottom: 5px;}

        /* Buttons */
        button { padding: 12px; border-radius: 12px; border: none; background: linear-gradient(135deg, var(--primary), #38a169); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { transform: scale(1.02); }
        .admin-trigger { background: transparent; border: 1px solid var(--accent); color: var(--accent); font-size: 0.7rem; padding: 5px 10px; }
        .checkout-btn { background: var(--accent); color: var(--dark); width: 100%; margin-top: 20px; font-size: 1.1rem; }

        /* Modals (Checkout & Admin Login) */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .glass-card { background: rgba(25, 30, 45, 0.9); padding: 40px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); width: 380px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white; outline: none; }
        
        .cart-counter { background: var(--accent); color: var(--dark); padding: 2px 8px; border-radius: 50%; font-size: 0.8rem; margin-left: 5px; }
    </style>
</head>
<body>

    <div id="user-app">
        <nav class="navbar">
            <h1 class="logo">THE NIGHT<span>HUNGER</span></h1>
            <div style="display:flex; align-items:center; gap:15px;">
                <button class="admin-trigger" onclick="openAdminModal()">Admin Login</button>
                <button onclick="openCheckoutModal()">🛒 Cart <span id="cart-count" class="cart-counter">0</span></button>
            </div>
        </nav>
        
        <div class="nav-cats">
            <button class="cat-btn">Biryanis</button>
            <button class="cat-btn">Fried Rice</button>
            <button class="cat-btn">Snacks</button>
            <button class="cat-btn">Drinks</button>
        </div>

        <div class="food-grid" id="menu-items">
            </div>
    </div>

    <div id="admin-dashboard" class="hidden" style="padding: 20px 5%;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h1>Admin Dashboard</h1>
            <button onclick="exitAdmin()" style="background:#e53e3e;">Exit Admin</button>
        </div>
        <div class="glass-card" style="width: 100%; text-align: left; background: #2d3748;">
            <h3>Add New Item</h3>
            <input type="text" id="new-item-name" placeholder="Item Name">
            <input type="number" id="new-item-price" placeholder="Base Price (₹)">
            <button onclick="alert('Item Added (Simulated)')">Upload Item</button>
        </div>
    </div>

    <div id="checkout-modal" class="modal-overlay hidden">
        <div class="glass-card">
            <h2>Complete Order</h2>
            <p id="cart-summary" style="font-size: 0.9rem; color: var(--accent-light);"></p>
            <hr style="border: 0.5px solid rgba(255,255,255,0.1); margin: 20px 0;">
            <input type="text" id="cust-name" placeholder="Enter Your Name">
            <input type="tel" id="cust-phone" placeholder="Enter Phone Number">
            <button class="checkout-btn" onclick="submitOrder()">Place Order (WhatsApp)</button>
            <p style="cursor:pointer; font-size:0.8rem; margin-top:15px;" onclick="closeModals()">Cancel</p>
        </div>
    </div>

    <div id="admin-modal" class="modal-overlay hidden">
        <div class="glass-card">
            <h2>Staff Portal</h2>
            <input type="text" id="a-id" placeholder="Admin ID">
            <input type="password" id="a-pass" placeholder="Password">
            <button onclick="adminLogin()">Login</button>
            <p style="cursor:pointer; font-size:0.8rem; margin-top:15px;" onclick="closeModals()">Cancel</p>
        </div>
    </div>

    <script>
        const PARCEL_CHARGE = 15;
        let cart = [];

        const menuItems = [
            { id: 1, name: "Chicken Biryani", price: 220, img: "https://images.unsplash.com/photo-1630409351241-e90e76d94132?w=400" },
            { id: 2, name: "Egg Fried Rice", price: 150, img: "https://images.unsplash.com/photo-1603133872878-684f208fb84b?w=400" },
            { id: 3, name: "Manchuria", price: 120, img: "https://images.unsplash.com/photo-1512152272829-e3139592d56f?w=400" }
        ];

       
        function renderMenu() {
            const grid = document.getElementById('menu-items');
            grid.innerHTML = menuItems.map(item => `
                <div class="food-card">
                    <img src="${item.img}" alt="${item.name}">
                    <h3>${item.name}</h3>
                    <span class="price-tag">₹${item.price}</span>
                    <span class="parcel-info">+ ₹${PARCEL_CHARGE} Parcel Fee</span>
                    <button onclick="addToCart(${item.id})">Add to Basket</button>
                </div>
            `).join('');
        }

         
        function addToCart(id) {
            const item = menuItems.find(i => i.id === id);
            cart.push(item);
            document.getElementById('cart-count').innerText = cart.length;
            alert(`${item.name} added!`);
        }

        function openCheckoutModal() {
            if (cart.length === 0) return alert("Your basket is empty!");
            const total = cart.reduce((sum, item) => sum + item.price + PARCEL_CHARGE, 0);
            document.getElementById('cart-summary').innerText = `Items: ${cart.length} | Total: ₹${total}`;
            document.getElementById('checkout-modal').classList.remove('hidden');
        }

        function submitOrder() {
            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;

            if (!name || !phone) return alert("Please enter Name and Phone");

            const itemsText = cart.map(i => i.name).join(', ');
            const total = cart.reduce((sum, item) => sum + item.price + PARCEL_CHARGE, 0);
            
            const message = `Namaskaram! New Order from ${name} (${phone}):\nItems: ${itemsText}\nTotal: ₹${total}\n(Parcel Charges Included)`;
            
             
            const adminPhone = "9393969353"; 
            window.open(`https://wa.me/${adminPhone}?text=${encodeURIComponent(message)}`, '_blank');
            
            cart = [];
            document.getElementById('cart-count').innerText = "0";
            closeModals();
            alert("Order sent to kitchen!");
        }

      
        function openAdminModal() { document.getElementById('admin-modal').classList.remove('hidden'); }
        
        function adminLogin() {
            const id = document.getElementById('a-id').value;
            const pass = document.getElementById('a-pass').value;
            if (id === "havi-reddy" && pass === "123456789") {
                document.getElementById('user-app').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                closeModals();
            } else { alert("Invalid Staff ID"); }
        }

        function exitAdmin() {
            document.getElementById('admin-dashboard').classList.add('hidden');
            document.getElementById('user-app').classList.remove('hidden');
        }

        function closeModals() {
            document.querySelectorAll('.modal-overlay').forEach(m => m.classList.add('hidden'));
        }

        window.onload = renderMenu;
    </script>
</body>
</html>
